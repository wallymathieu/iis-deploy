name: 'IIS Versioned Deploy'
description: 'Allows to deploy a website on IIS with less downtime by using rotational folders. Supports Site and/or Site/VirtualApp'
inputs:
  site-name:
    description: "IIS site name"
    required: true
  app-name:
    description: "IIS site application name (eg: Virtual application name)"
    required: false
    default: ''
  source-path:
    description: "The path to the source directory that will be deployed"
    required: true
  destination-path:
    description: "The path to the site directory that will be deployed"
    required: true
  release-prefix:
    description: "Prefix used for the versioned release folders (e.g. 'r_' produces r_1, r_2, ...)"
    required: false
    default: 'r_'
  number-to-keep:
    description: "Number of previous deployments to keep"
    required: false
    default: '4'

runs:
  using: "composite"
  steps:
    - name: Deploy Application ${{ inputs.site-name }} ${{ inputs.app-name }} on IIS
      shell: powershell
      run: |
        $deployArgs = @{
          sourceDir = '${{ inputs.source-path }}'
          siteName = '${{ inputs.site-name }}'
          releaseParentDir = '${{ inputs.destination-path }}'
          keep = '${{ inputs.number-to-keep }}'
        }

        if (-not [string]::IsNullOrWhiteSpace('${{ inputs.release-prefix }}')) {
          $deployArgs.releasePrefix = '${{ inputs.release-prefix }}'
        }

        if (-not [string]::IsNullOrWhiteSpace('${{ inputs.app-name }}')) {
          $deployArgs.appName = '${{ inputs.app-name }}'
        }

        & "${{ github.action_path }}/scripts/deploy.ps1" @deployArgs
branding:
  icon: upload-cloud
  color: blue
