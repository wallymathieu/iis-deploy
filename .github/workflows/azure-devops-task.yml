# Builds the Azure DevOps task, packages it into a VSIX extension and
# uploads the package as a workflow artifact.
# For more information see: https://docs.github.com/en/actions/publishing-packages

name: Build Azure DevOps Extension

on:
  push:
    branches: ['master','main']
    tags: ['*']
  pull_request:
    branches: ['master','main']

jobs:
  build:
    name: Build and package extension
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install, build and test task
        run: |
          npm ci
          npm run build
          npm test
          npm prune --omit=dev
        working-directory: buildandreleasetask

      - name: Create VSIX extension package
        run: npx tfx-cli extension create --manifest-globs vss-extension.json

      - name: Upload VSIX package
        uses: actions/upload-artifact@v4
        with:
          name: iis-versioned-deploy-vsix
          path: ./*.vsix
